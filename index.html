<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Notion Heart Counter</title>
    <style>
        /* 노션 임베드 최적화: 투명 배경, 스크롤바 숨김, 여백 제거 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            overflow: hidden; 
        }
        
        /* 버튼 클릭 시 띠용~ 하는 자연스러운 애니메이션 */
        .heart-btn:active #heartIcon { transform: scale(0.85); }
        .heart-btn:active #count { transform: scale(0.95); }
        
        /* 텍스트 드래그 선택 방지 (더 자연스러운 버튼 느낌) */
        button { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="relative"> <!-- 관리자 버튼 띄우기를 위해 relative 추가 -->

    <!-- 
      하트 버튼 영역 
      수정됨: w-full h-full을 주어 임베드 화면 전체를 버튼으로 만듦.
      어디를 클릭해도 하트가 눌리게 하여 모바일/PC 모두에서 사용성 극대화.
    -->
    <button id="likeBtn" class="heart-btn w-full h-full flex flex-col items-center justify-center cursor-pointer outline-none tap-highlight-transparent">
        <!-- Lucide 아이콘: 렌더링 후 js에서 svg로 바뀜 (트랜지션 애니메이션 분리) -->
        <i data-lucide="heart" id="heartIcon" class="w-10 h-10 text-gray-400 transition-all duration-200 ease-out"></i>
        <!-- 카운터 숫자 -->
        <span id="count" class="text-sm font-bold mt-1 font-sans text-gray-600 transition-all duration-200">0</span>
    </button>

    <!-- 관리자용 초기화 버튼 (기본 숨김) 
         수정됨: 하트 정렬에 영향을 주지 않도록 화면 우측 상단(absolute)에 고정 -->
    <button id="resetBtn" class="hidden absolute top-2 right-2 px-3 py-1 bg-gray-200 text-gray-600 rounded text-xs hover:bg-gray-300 transition-colors font-sans shadow-sm z-10">
        카운트 초기화
    </button>

    <!-- Firebase 및 로직 처리 -->
    <script type="module">
        // Firebase 모듈 불러오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 사용자 제공 Firebase Config + databaseURL 추가
        const firebaseConfig = {
            apiKey: "AIzaSyD_kt6oeIyli0kPOTUPskNKcpVXyouOJsw",
            authDomain: "heart-counter-cf70b.firebaseapp.com",
            projectId: "heart-counter-cf70b",
            storageBucket: "heart-counter-cf70b.firebasestorage.app",
            messagingSenderId: "84261444673",
            appId: "1:84261444673:web:386adaeae6f87ff3033ac0",
            measurementId: "G-DEC04Z6BXW",
            // 필수: Realtime Database URL (본인의 실제 지역 URL로 변경)
            databaseURL: "https://heart-counter-cf70b-default-rtdb.asia-northeast3.firebasedatabase.app"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        // DB 저장 경로 설정 (notion/heartCount)
        const countRef = ref(db, 'notion/heartCount');

        // DOM 요소 가져오기
        const countEl = document.getElementById('count');
        const likeBtn = document.getElementById('likeBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 로컬 스토리지 키
        const LOCAL_KEY = 'notion_heart_liked';
        let isLiked = localStorage.getItem(LOCAL_KEY) === 'true';

        // 아이콘 UI 업데이트 함수 (하트 색상 변경)
        function updateUIIcon(likedState) {
            // Lucide가 <i> 태그를 <svg>로 변환하므로 svg를 찾아서 클래스를 조작합니다.
            const svgIcon = likeBtn.querySelector('svg');
            if (!svgIcon) return;

            if (likedState) {
                svgIcon.classList.remove('text-gray-400');
                svgIcon.classList.add('text-red-500', 'fill-red-500'); // 빨간색 채우기
            } else {
                svgIcon.classList.remove('text-red-500', 'fill-red-500');
                svgIcon.classList.add('text-gray-400'); // 회색 테두리
            }
        }

        // 아이콘 렌더링 후 초기 UI 반영
        setTimeout(() => updateUIIcon(isLiked), 50);

        // 실시간 DB 데이터 수신 (숫자 업데이트)
        onValue(countRef, (snapshot) => {
            const val = snapshot.val();
            countEl.innerText = val || 0;
        });

        // 하트 클릭 이벤트 (토글 방식)
        likeBtn.addEventListener('click', async () => {
            isLiked = !isLiked; // 상태 토글 (true <-> false)
            
            // 로컬 스토리지 업데이트
            if (isLiked) {
                localStorage.setItem(LOCAL_KEY, 'true');
            } else {
                localStorage.removeItem(LOCAL_KEY);
            }

            // 클릭 즉시 UI 반응 (빠른 피드백)
            updateUIIcon(isLiked);

            // DB 업데이트 (트랜잭션으로 동시성 문제 방지)
            await runTransaction(countRef, (currentData) => {
                let count = currentData || 0;
                if (isLiked) {
                    return count + 1; // 누르면 +1
                } else {
                    return Math.max(0, count - 1); // 다시 누르면 -1 (최소 0 유지)
                }
            });
        });

        // --- 관리자 모드 로직 ---
        // 주소창에 ?admin=true 가 있으면 버튼 표시
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            resetBtn.classList.remove('hidden');
            
            // 초기화 버튼 클릭 이벤트
            resetBtn.addEventListener('click', async () => {
                await set(countRef, 0); // DB 강제 0으로 초기화
                localStorage.removeItem(LOCAL_KEY); // 본인 로컬 기록 삭제
                isLiked = false;
                updateUIIcon(false); // 빈 하트로 되돌리기
                
                // 완료 메시지 표시 후 원상복구
                const originalText = resetBtn.innerText;
                resetBtn.innerText = "초기화 완료!";
                setTimeout(() => {
                    resetBtn.innerText = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
